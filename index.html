<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KaufBuddy – Günstig einkaufen</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f0ea; min-height: 100vh; }
.header { background: #1a8c5b; color: white; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
.header span { color: #a8f0d0; }
.header small { font-size: 12px; color: #a8f0d0; }
.cats { display: flex; gap: 8px; padding: 14px 16px; overflow-x: auto; background: white; border-bottom: 1px solid #eee; }
.cats::-webkit-scrollbar { display: none; }
.cat-btn { padding: 7px 14px; border-radius: 20px; border: 1.5px solid #ddd; background: white; font-size: 13px; cursor: pointer; white-space: nowrap; color: #555; font-weight: 500; }
.cat-btn.active { background: #1a8c5b; color: white; border-color: #1a8c5b; }
.app { max-width: 480px; margin: 0 auto; padding: 14px; }
.add-row { display: flex; gap: 8px; margin-bottom: 16px; }
.add-row input { flex: 1; padding: 12px 14px; border: 1.5px solid #ddd; border-radius: 12px; font-size: 15px; background: white; }
.add-row input:focus { outline: none; border-color: #1a8c5b; }
.add-row button { padding: 12px 18px; background: #1a8c5b; color: white; border: none; border-radius: 12px; font-size: 15px; cursor: pointer; font-weight: 600; }
.section-label { font-size: 11px; color: #999; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }
.item-card { background: white; border-radius: 14px; padding: 14px; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.item-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.item-left { display: flex; align-items: center; gap: 10px; }
.item-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.item-name { font-size: 16px; font-weight: 600; color: #1a1a1a; }
.item-cat { font-size: 12px; color: #999; }
.item-qty { display: flex; align-items: center; gap: 10px; }
.qty-btn { width: 30px; height: 30px; border: 1.5px solid #e0e0e0; border-radius: 50%; background: #f8f8f8; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; color: #333; }
.qty-num { font-size: 15px; font-weight: 700; min-width: 20px; text-align: center; }
.delete-btn { background: none; border: none; cursor: pointer; color: #ddd; font-size: 20px; padding: 0 4px; margin-left: 4px; }
.prices { display: flex; gap: 6px; flex-wrap: wrap; }
.price-tag { display: flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 20px; font-size: 13px; font-weight: 600; }
.price-tag.best { background: #e1f5ee; color: #0a6640; }
.price-tag.mid { background: #f5f5f5; color: #777; }
.price-tag.high { background: #fff0f0; color: #c03030; }
.dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.best .dot { background: #1a8c5b; }
.mid .dot { background: #bbb; }
.high .dot { background: #e04040; }
.summary { background: white; border-radius: 14px; padding: 16px; margin-top: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.sum-title { font-size: 12px; color: #999; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; margin-bottom: 12px; }
.sum-row { display: flex; justify-content: space-between; align-items: center; font-size: 14px; padding: 6px 0; border-bottom: 1px solid #f5f5f5; }
.sum-store { display: flex; align-items: center; gap: 8px; color: #555; }
.sum-store-dot { width: 8px; height: 8px; border-radius: 50%; }
.sum-price { font-weight: 600; color: #1a1a1a; }
.sum-best { background: #f0fbf6; border-radius: 10px; padding: 12px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
.sum-best-label { font-size: 13px; color: #1a8c5b; font-weight: 600; }
.sum-best-price { font-size: 20px; font-weight: 800; color: #1a8c5b; }
.savings-badge { background: #1a8c5b; color: white; border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 600; margin-top: 8px; display: inline-block; }
.empty { text-align: center; color: #bbb; padding: 50px 20px; font-size: 15px; }
.empty-icon { font-size: 40px; margin-bottom: 10px; }
.suggest { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.suggest-btn { padding: 6px 12px; background: white; border: 1.5px solid #e0e0e0; border-radius: 20px; font-size: 13px; cursor: pointer; color: #555; }
.gps-card { background: white; border-radius: 14px; padding: 14px; margin-bottom: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.gps-title { font-size: 12px; color: #999; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; margin-bottom: 10px; }
.gps-btn { width: 100%; padding: 10px; background: #1a8c5b; color: white; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; font-weight: 600; }
.store-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f5f5f5; }
.store-item:last-child { border-bottom: none; }
.store-left { display: flex; align-items: center; gap: 10px; }
.store-dot-big { width: 10px; height: 10px; border-radius: 50%; }
.store-name { font-size: 14px; font-weight: 600; color: #1a1a1a; }
.store-addr { font-size: 12px; color: #999; }
.store-dist { font-size: 13px; font-weight: 600; color: #1a8c5b; }
.store-nav { background: #f0fbf6; border: none; border-radius: 8px; padding: 6px 10px; font-size: 12px; color: #1a8c5b; cursor: pointer; font-weight: 600; }
</style>
</head>
<body>
<div class="header"><h1>Kauf<span>Buddy</span></h1><small>Spare Geld beim Einkauf</small></div>
<div class="cats" id="cats"></div>
<div class="app">
<div class="gps-card">
  <div class="gps-title">Geschäfte in der Nähe</div>
  <div id="storeList"><button class="gps-btn" onclick="findStores()">Geschäfte in meiner Nähe finden</button></div>
</div>
<div class="add-row"><input type="text" id="newItem" placeholder="Produkt hinzufügen..." /><button onclick="addItem()">+</button></div>
<div class="suggest" id="suggest"></div>
<div class="section-label" id="listLabel" style="display:none">Einkaufsliste</div>
<div id="itemList"><div class="empty"><div class="empty-icon">&#128722;</div>Liste ist leer<br>Füge Produkte hinzu!</div></div>
<div id="summary" style="display:none"></div>
</div>
<script>
const cats=[{id:'all',label:'Alle',icon:'&#128717;'},{id:'lebensmittel',label:'Lebensmittel',icon:'&#129367;'},{id:'getraenke',label:'Getränke',icon:'&#129380;'},{id:'milch',label:'Milch & Käse',icon:'&#129371;'},{id:'backwaren',label:'Backwaren',icon:'&#127838;'},{id:'haushalt',label:'Haushalt',icon:'&#129529;'},{id:'koerperpflege',label:'Körperpflege',icon:'&#129524;'},{id:'papeterie',label:'Papeterie',icon:'&#128221;'},{id:'tierbedarf',label:'Tierbedarf',icon:'&#128062;'}];
const db={"Milch":{cat:'milch',icon:'&#129371;',bg:'#e8f4ff',aldi:0.89,lidl:0.95,rewe:1.09},"Butter":{cat:'milch',icon:'&#129480;',bg:'#fff8e1',aldi:1.79,lidl:1.89,rewe:2.19},"Käse":{cat:'milch',icon:'&#129472;',bg:'#fff8e1',aldi:1.99,lidl:2.19,rewe:2.49},"Joghurt":{cat:'milch',icon:'&#129371;',bg:'#e8f4ff',aldi:0.49,lidl:0.55,rewe:0.69},"Eier":{cat:'lebensmittel',icon:'&#129370;',bg:'#fff8e1',aldi:2.19,lidl:2.29,rewe:2.79},"Bananen":{cat:'lebensmittel',icon:'&#127820;',bg:'#fffde7',aldi:0.99,lidl:1.09,rewe:1.29},"Äpfel":{cat:'lebensmittel',icon:'&#127822;',bg:'#ffebee',aldi:1.49,lidl:1.59,rewe:1.89},"Tomaten":{cat:'lebensmittel',icon:'&#127813;',bg:'#ffebee',aldi:0.99,lidl:1.09,rewe:1.39},"Kartoffeln":{cat:'lebensmittel',icon:'&#129364;',bg:'#fff3e0',aldi:1.29,lidl:1.39,rewe:1.69},"Hühnerbrust":{cat:'lebensmittel',icon:'&#127831;',bg:'#fff3e0',aldi:3.99,lidl:4.29,rewe:4.99},"Zucker":{cat:'lebensmittel',icon:'&#127852;',bg:'#fff8e1',aldi:0.99,lidl:1.09,rewe:1.29},"Nutella":{cat:'lebensmittel',icon:'&#127851;',bg:'#fff3e0',aldi:2.99,lidl:3.19,rewe:3.49},"Brot":{cat:'backwaren',icon:'&#127838;',bg:'#fff3e0',aldi:1.29,lidl:1.19,rewe:1.49},"Brötchen":{cat:'backwaren',icon:'&#129366;',bg:'#fff8e1',aldi:0.19,lidl:0.22,rewe:0.29},"Toastbrot":{cat:'backwaren',icon:'&#127838;',bg:'#fff3e0',aldi:0.89,lidl:0.95,rewe:1.19},"Wasser":{cat:'getraenke',icon:'&#128167;',bg:'#e3f2fd',aldi:0.19,lidl:0.25,rewe:0.35},"Cola":{cat:'getraenke',icon:'&#129380;',bg:'#fce4ec',aldi:0.79,lidl:0.85,rewe:0.99},"Orangensaft":{cat:'getraenke',icon:'&#127818;',bg:'#fff3e0',aldi:0.99,lidl:1.09,rewe:1.29},"Bier":{cat:'getraenke',icon:'&#127866;',bg:'#fff8e1',aldi:0.69,lidl:0.75,rewe:0.89},"Wein":{cat:'getraenke',icon:'&#127863;',bg:'#fce4ec',aldi:3.99,lidl:4.49,rewe:5.99},"Spülmittel":{cat:'haushalt',icon:'&#129524;',bg:'#e8f5e9',aldi:0.79,lidl:0.89,rewe:1.09},"Waschmittel":{cat:'haushalt',icon:'&#129530;',bg:'#e8f5e9',aldi:3.49,lidl:3.79,rewe:4.49},"Toilettenpapier":{cat:'haushalt',icon:'&#129531;',bg:'#f5f5f5',aldi:2.99,lidl:3.19,rewe:3.79},"Müllbeutel":{cat:'haushalt',icon:'&#128465;',bg:'#f5f5f5',aldi:1.49,lidl:1.59,rewe:1.99},"Shampoo":{cat:'koerperpflege',icon:'&#129524;',bg:'#e8f4ff',aldi:1.49,lidl:1.69,rewe:2.19},"Zahnpasta":{cat:'koerperpflege',icon:'&#129463;',bg:'#e8f4ff',aldi:0.89,lidl:0.99,rewe:1.39},"Deo":{cat:'koerperpflege',icon:'&#129524;',bg:'#e8f4ff',aldi:1.29,lidl:1.49,rewe:1.99},"Notizheft":{cat:'papeterie',icon:'&#128211;',bg:'#f3e5f5',aldi:0.99,lidl:1.09,rewe:1.49},"Kugelschreiber":{cat:'papeterie',icon:'&#128394;',bg:'#f3e5f5',aldi:0.49,lidl:0.55,rewe:0.79},"Hundefutter":{cat:'tierbedarf',icon:'&#128021;',bg:'#fff3e0',aldi:1.99,lidl:2.19,rewe:2.79},"Katzenfutter":{cat:'tierbedarf',icon:'&#128008;',bg:'#fff3e0',aldi:0.59,lidl:0.65,rewe:0.89},"Kinder":{cat:'lebensmittel',icon:'&#127851;',bg:'#fce4ec',aldi:0.79,lidl:0.89,rewe:0.99}};
let items=[],activeCat='all';
function findStores(){
  var el=document.getElementById('storeList');
  el.innerHTML='<div style="text-align:center;color:#999;padding:10px">Suche Geschäfte...</div>';
  if(!navigator.geolocation){el.innerHTML='<div style="color:#e04040;font-size:13px">GPS nicht verfügbar</div>';return;}
  navigator.geolocation.getCurrentPosition(function(pos){
    var lat=pos.coords.latitude,lng=pos.coords.longitude;
    var q='[out:json][timeout:20];(node["shop"~"supermarket|discount"](around:3000,'+lat+','+lng+');way["shop"~"supermarket|discount"](around:3000,'+lat+','+lng+'););out center;';
    fetch('https://overpass-api.de/api/interpreter?data='+encodeURIComponent(q))
    .then(function(r){return r.json();})
    .then(function(data){
      var found={};
      var names=['Aldi','Lidl','Rewe','Netto','Penny','Edeka'];
      var colors={aldi:'#1a8c5b',lidl:'#f5a623',rewe:'#e02020',netto:'#e8c000',penny:'#cc0000',edeka:'#e20020'};
      data.elements.forEach(function(e){
        var name=(e.tags&&e.tags.name)||'';
        var elat=e.lat||(e.center&&e.center.lat);
        var elng=e.lon||(e.center&&e.center.lon);
        if(!elat||!elng||!name)return;
        var dist=Math.round(Math.sqrt(Math.pow((elat-lat)*111000,2)+Math.pow((elng-lng)*71500,2)));
        names.forEach(function(s){
          if(name.toLowerCase().indexOf(s.toLowerCase())>=0){
            if(!found[s]||dist<found[s].dist)found[s]={name:s,dist:dist,lat:elat,lng:elng,fullName:name};
          }
        });
      });
      var sorted=Object.values(found).sort(function(a,b){return a.dist-b.dist;});
      if(!sorted.length){el.innerHTML='<div style="color:#999;font-size:13px;padding:8px">Keine Geschäfte in der Nähe gefunden</div>';return;}
      el.innerHTML=sorted.map(function(s){
        var distStr=s.dist<1000?s.dist+' m':(s.dist/1000).toFixed(1)+' km';
        var color=colors[s.name.toLowerCase()]||'#888';
        return '<div class="store-item"><div class="store-left"><div class="store-dot-big" style="background:'+color+'"></div><div><div class="store-name">'+s.fullName+'</div><div class="store-addr">'+distStr+' entfernt</div></div></div><div style="display:flex;align-items:center;gap:8px"><span class="store-dist">'+distStr+'</span><button class="store-nav" onclick="openMaps(''+s.fullName.replace(/'/g,'')+'','+lat+','+lng+')">Nav</button></div></div>';
      }).join('');
    })
    .catch(function(){el.innerHTML='<div style="color:#e04040;font-size:13px;padding:8px">Fehler beim Laden</div>';});
  },function(){el.innerHTML='<div style="color:#e04040;font-size:13px;padding:8px">GPS-Zugriff verweigert. Bitte Standort erlauben!</div>';});
}
function openMaps(s,lat,lng){window.open('https://www.google.com/maps/search/'+encodeURIComponent(s)+'/@'+lat+','+lng+',14z','_blank');}
function renderCats(){document.getElementById('cats').innerHTML=cats.map(function(c){return '<button class="cat-btn'+(activeCat===c.id?' active':'')+'" onclick="setCat(''+c.id+'')">'+c.icon+' '+c.label+'</button>';}).join('');}
function setCat(id){activeCat=id;renderCats();renderSuggest();}
function renderSuggest(){document.getElementById('suggest').innerHTML=Object.keys(db).filter(function(k){return activeCat==='all'||db[k].cat===activeCat;}).slice(0,8).map(function(k){return '<button class="suggest-btn" onclick="addByName(''+k+'')">'+db[k].icon+' '+k+'</button>';}).join('');}
function addByName(name){if(items.find(function(i){return i.name===name;}))return;items.push({name:name,qty:1});render();}
function addItem(){var input=document.getElementById('newItem'),name=input.value.trim();if(!name)return;var found=Object.keys(db).find(function(k){return k.toLowerCase()===name.toLowerCase();});if(items.find(function(i){return i.name===(found||name);})){input.value='';return;}items.push({name:found||name,qty:1});input.value='';render();}
function changeQty(i,d){items[i].qty=Math.max(1,items[i].qty+d);render();}
function removeItem(i){items.splice(i,1);render();}
function render(){var list=document.getElementById('itemList'),label=document.getElementById('listLabel'),sum=document.getElementById('summary');if(items.length===0){list.innerHTML='<div class="empty"><div class="empty-icon">&#128722;</div>Liste ist leer<br>Füge Produkte hinzu!</div>';label.style.display='none';sum.style.display='none';return;}label.style.display='block';var tA=0,tL=0,tR=0;list.innerHTML=items.map(function(item,i){var p=db[item.name];var ph='';if(p){var s=[{n:'Aldi',v:p.aldi},{n:'Lidl',v:p.lidl},{n:'Rewe',v:p.rewe}].sort(function(a,b){return a.v-b.v;});tA+=p.aldi*item.qty;tL+=p.lidl*item.qty;tR+=p.rewe*item.qty;ph=s.map(function(x,si){return '<div class="price-tag '+(si===0?'best':si===1?'mid':'high')+'"><div class="dot"></div>'+x.n+' '+(x.v*item.qty).toFixed(2)+'&euro;'+(si===0?' &#10003;':'')+'</div>';}).join('');}else{ph='<span style="font-size:13px;color:#bbb">Preis unbekannt</span>';}var icon=p?p.icon:'&#128230;',bg=p?p.bg:'#f5f5f5',catName=p?cats.find(function(c){return c.id===p.cat;})?cats.find(function(c){return c.id===p.cat;}).label:'':'';return '<div class="item-card"><div class="item-top"><div class="item-left"><div class="item-icon" style="background:'+bg+'">'+icon+'</div><div><div class="item-name">'+item.name+'</div><div class="item-cat">'+catName+'</div></div></div><div style="display:flex;align-items:center"><div class="item-qty"><button class="qty-btn" onclick="changeQty('+i+',-1)">&#8722;</button><span class="qty-num">'+item.qty+'</span><button class="qty-btn" onclick="changeQty('+i+',1)">+</button></div><button class="delete-btn" onclick="removeItem('+i+')">&#215;</button></div></div><div class="prices">'+ph+'</div></div>';}).join('');if(tA||tL||tR){sum.style.display='block';var stores=[{n:'Aldi',v:tA,c:'#1a8c5b'},{n:'Lidl',v:tL,c:'#f5a623'},{n:'Rewe',v:tR,c:'#e02020'}],best=Math.min(tA,tL,tR),worst=Math.max(tA,tL,tR),bestStore=stores.find(function(s){return s.v===best;});sum.innerHTML='<div class="sum-title">Preisvergleich gesamt</div>'+stores.sort(function(a,b){return a.v-b.v;}).map(function(s){return '<div class="sum-row"><div class="sum-store"><div class="sum-store-dot" style="background:'+s.c+'"></div>'+s.n+'</div><div class="sum-price">'+s.v.toFixed(2)+'&euro;</div></div>';}).join('')+'<div class="sum-best"><div><div class="sum-best-label">Bestes Angebot</div><div style="font-size:12px;color:#999">'+bestStore.n+' ist am günstigsten</div></div><div class="sum-best-price">'+best.toFixed(2)+'&euro;</div></div><div><span class="savings-badge">Du sparst '+(worst-best).toFixed(2)+'&euro; &#128176;</span></div>';}}
document.getElementById('newItem').addEventListener('keydown',function(e){if(e.key==='Enter')addItem();});
renderCats();renderSuggest();
</script>
</body>
</html>
